connector.keycloak.clients.display=Keycloak OAuth Clients Connector
# Parent class (AbstractRestConfiguration) properties
serviceAddress.display=Keycloak Base URL
serviceAddress.help=Base URL of the Keycloak server (e.g. https://auth.flowbridge.net)
username.display=Username
username.help=Username for admin authentication (not used — use clientId instead)
password.display=Client Secret
password.help=The client secret for the admin service account (midpoint-admin)
authMethod.display=Authentication Method
authMethod.help=Authentication method (NONE, BASIC, or TOKEN)
trustAllCertificates.display=Trust All Certificates
trustAllCertificates.help=Skip SSL certificate validation (not recommended for production)
tokenName.display=Token Header Name
tokenName.help=Header name for token-based authentication
tokenValue.display=Token Value
tokenValue.help=Token value for token-based authentication
proxy.display=Proxy Address
proxy.help=HTTP proxy server address
proxyPort.display=Proxy Port
proxyPort.help=HTTP proxy server port
# Connector-specific properties
realm.display=Target Realm
realm.help=The Keycloak realm to manage OAuth clients in (e.g. ai-flowbridge)
adminRealm.display=Admin Realm
adminRealm.help=The realm used for admin authentication (default: master)
clientId.display=Admin Client ID
clientId.help=The client ID used for admin API authentication (e.g. midpoint-admin)
tokenEndpoint.display=Token Endpoint Override
tokenEndpoint.help=Override the OAuth token endpoint URL. If blank, derived from serviceAddress and adminRealm.
